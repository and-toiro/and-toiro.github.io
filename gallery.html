<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />

    />
    <link rel="stylesheet" href="style.css" />

  <body class="page-gallery">
    <!-- ================= ヘッダー ================= -->
     <header>
      <div class="container header-inner">
        <a href="index.html" class="logo">
        <img src="ヘッダーロゴ.png" alt="美容室 &toiro ロゴ">
        </a>

<button class="nav-toggle" aria-controls="site-nav" aria-expanded="false" aria-label="メニューを開く">
  <span class="nav-toggle-bar"></span>
  <span class="nav-toggle-bar"></span>
  <span class="nav-toggle-bar"></span>
</button>

        <!-- ナビゲーション -->
    <nav id="site-nav" class="site-nav">
          <ul>
            <li><a href="index.html">TOP</a></li>
            <li><a href="concept.html">コンセプト</a></li>
            <li><a href="menu.html">メニュー</a></li>
            <li><a href="gallery.html" class="active">ギャラリー</a></li>
            <li><a href="access.html">アクセス</a></li>
            <li><a href="reserve.html">ご予約</a></li>

        </nav>

    </header>

    <!-- ================= ギャラリー ================= -->
    <main>
      <section class="section">
        <div class="container">
          <h1 class="section-title">GALLERY</h1>
          <p class="section-subtitle">
            &toiro でお手伝いさせていただいた<br class="br-sp">施術の一例です。<br>
            イメージのすり合わせにもご活用ください。
          </p>

         <!-- ギャラリーグリッド -->
<div class="gallery-grid">
  <div class="gallery-item">
    <img
      src="gallery1.JPG"
      alt="頭浸浴によるヘッドスパ施術"

    />

  <div class="gallery-item">

      src="gallery2.JPG"

    />

  <div class="gallery-item">

      src="gallery3.jpg"

    />
  </div>

  <div class="gallery-item">
    <img
      src="gallery4.jpg"

  <div class="gallery-item">

      src="gallery5.png"

</div>
        </div>

    <!-- ================= フッター ================= -->
    <footer>

        <div class="footer-copy">

      </div>
    </footer>
  <script>
document.addEventListener("DOMContentLoaded", function () {
  /* ===== ハンバーガーメニュー（is-open 方式） ===== */
  const toggle = document.querySelector(".nav-toggle");
  const nav = document.getElementById("site-nav");

  if (toggle && nav) {
    toggle.addEventListener("click", function () {
      const isOpen = nav.classList.toggle("is-open");
      toggle.setAttribute("aria-expanded", String(isOpen));
    });
  }
});
</script>
  </body>
</html>
